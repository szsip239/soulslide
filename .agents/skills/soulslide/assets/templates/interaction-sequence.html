<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>08 · Interaction Sequence</title>
<link rel="stylesheet" href="../soulslide.css">
</head>
<body class="ss-doc">
<main class="ss-slide">
  <header class="ss-head"><div class="ss-brand">SoulSlide template</div><div class="ss-topic">interaction sequence</div><div class="ss-page">08 / 10</div></header>
  <section class="ss-title-row">
    <div class="ss-title-num">08</div>
    <h1 class="ss-title-main">顺序交互：让翻页笔先推进 <span class="ss-mark">页内讲述</span></h1>
    <div class="ss-kicker">用于必须按顺序展示的图片、视频、demo 或前后对比。</div>
  </section>
  <section class="ss-main ss-seq-grid">
    <button class="ss-seq-preview" id="openSeq">open sequence</button>
    <section class="ss-seq-list">
      <div class="ss-seq-item"><div class="ss-no">01</div><p>第一次右键打开序列层，展示第一步。</p></div>
      <div class="ss-seq-item"><div class="ss-no">02</div><p>继续右键推进页内步骤，而不是直接翻到下一页。</p></div>
      <div class="ss-seq-item"><div class="ss-no">03</div><p>序列结束后释放父播放器导航。</p></div>
    </section>
  </section>
  <footer class="ss-foot"><span>Interaction sequence</span><span class="ss-line">Clicker-first interaction for required reveal order.</span><span>08</span></footer>
</main>
<div class="ss-overlay" id="seqOverlay">
  <div class="ss-overlay-card">
    <h2 id="seqTitle">Step 01</h2>
    <p id="seqBody">这里替换为第一张大图、视频说明或 demo 步骤。按右键进入下一步，按左键返回。</p>
  </div>
</div>
<script>
(() => {
  const overlay = document.getElementById('seqOverlay');
  const title = document.getElementById('seqTitle');
  const body = document.getElementById('seqBody');
  const steps = [
    ['Step 01', '第一步：打开需要讲解的图像、视频或界面。'],
    ['Step 02', '第二步：解释关键变化，保持听众注意力在同一个上下文。'],
    ['Step 03', '第三步：总结这组素材的结论，然后释放翻页。']
  ];
  let open = false;
  let index = 0;
  function render() {
    const step = steps[index];
    title.textContent = step[0];
    body.textContent = step[1];
    overlay.classList.toggle('active', open);
    window.__seqBlockNav = open && index < steps.length - 1;
  }
  function openSeq() { open = true; index = 0; render(); }
  function closeSeq() { open = false; window.__seqBlockNav = false; render(); }
  function normalize(key) {
    if (key === 'ArrowRight' || key === 'PageDown' || key === ' ') return 'next';
    if (key === 'ArrowLeft' || key === 'PageUp') return 'prev';
    if (key === 'Escape') return 'close';
    return null;
  }
  function handleNav(key) {
    const action = normalize(key);
    if (!action) return false;
    if (action === 'close') { closeSeq(); return true; }
    if (!open && action === 'next') { openSeq(); return true; }
    if (!open) return false;
    if (action === 'next') {
      if (index < steps.length - 1) { index += 1; render(); return true; }
      closeSeq();
      return false;
    }
    if (action === 'prev') {
      if (index > 0) { index -= 1; render(); return true; }
      closeSeq();
      return true;
    }
    return false;
  }
  document.getElementById('openSeq').addEventListener('click', openSeq);
  window.__seqHandleNav = handleNav;
  window.__seqBlockNav = false;
  window.addEventListener('keydown', (event) => {
    if (handleNav(event.key)) {
      event.preventDefault();
      event.stopImmediatePropagation();
    }
  }, true);
})();
</script>
</body>
</html>
